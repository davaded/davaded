name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: davaded
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%2310b981&color_dots=%23ebedf0,%23d1fae5,%236ee7b7,%2334d399,%2310b981
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23f9a8d4&color_dots=%23161b22,%231f2937,%23064e3b,%23059669,%2310b981

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
