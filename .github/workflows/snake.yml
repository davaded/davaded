name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: davaded
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23a855f7&color_dots=%23ebedf0,%23c4b5fd,%23a78bfa,%238b5cf6,%23ec4899
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23f472b6&color_dots=%23161b22,%23222b3a,%234c1d95,%237c3aed,%23ec4899

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
